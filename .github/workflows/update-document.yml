name: Update Documentation

on:
  push:
    paths:
      - 'src/kotlin/normal/**'
      - '.github/workflows/update-docs.yml'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tree
        run: sudo apt-get install -y tree
      
      - name: Generate and update all docs
        run: |
          python3 << 'PYTHON_EOF'
          import os
          import subprocess
          from pathlib import Path
          from datetime import datetime
          
          repo = os.environ.get('GITHUB_REPOSITORY', 'realmg51-cpu/KotlinCookBook')
          
          # ===== 1. GET TREE OUTPUT =====
          result = subprocess.run(
              ["tree", "src/kotlin/normal", "--dirsfirst", "-I", "*.md", "-L", "4"],
              capture_output=True, text=True
          )
          tree_output = result.stdout
          
          total_recipes = len(list(Path("src/kotlin/normal").rglob("*.kt")))
          categories = len([d for d in Path("src/kotlin/normal").iterdir() if d.is_dir()])
          now = datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')
          
          # ===== 2. BUILD STRUCTURE CONTENT =====
          structure_lines = []
          structure_lines.append("## 📁 Project Structure")
          structure_lines.append("")
          structure_lines.append("```")
          structure_lines.append(tree_output.strip())
          structure_lines.append("```")
          structure_lines.append("")
          structure_lines.append("### 📊 Statistics")
          structure_lines.append("")
          structure_lines.append("| Metric | Value |")
          structure_lines.append("|--------|-------|")
          structure_lines.append(f"| 🍳 **Total Recipes** | `{total_recipes}` files |")
          structure_lines.append(f"| 📁 **Categories** | `{categories}` folders |")
          structure_lines.append("")
          structure_lines.append("---")
          structure_lines.append("")
          structure_lines.append('<img src=".github/avatars/bot.svg" width="40">')
          structure_lines.append("")
          structure_lines.append("*Auto-updated by KotlinCookBot 🤖*")
          structure_lines.append(f"*Last update: {now}*")
          
          structure_content = "\n".join(structure_lines)
          
          # ===== 3. BUILD APPENDIX CONTENT =====
          appendix_lines = []
          appendix_lines.append("# 📚 KotlinCookBook - Complete Recipe Appendix")
          appendix_lines.append("")
          appendix_lines.append('> *"All recipes in one place - your complete Kotlin cookbook index!"* 🍳')
          appendix_lines.append("")
          appendix_lines.append("| Recipe | Code | Introduction |")
          appendix_lines.append("|--------|------|--------------|")
          
          count = 0
          intro_count = 0
          
          for kt_file in sorted(Path("src/kotlin/normal").rglob("*.kt")):
              if "introduction" in str(kt_file).lower():
                  continue
              
              name = kt_file.name
              dir_path = kt_file.parent
              intro_file = dir_path / "introduction.md"
              
              code_url = f"https://github.com/{repo}/blob/main/{kt_file}"
              code_link = f"[🔗 Code]({code_url})"
              
              if intro_file.exists():
                  intro_url = f"https://github.com/{repo}/blob/main/{intro_file}"
                  intro_link = f"[📖 Intro]({intro_url})"
                  intro_count += 1
              else:
                  intro_link = "❌ No intro"
              
              appendix_lines.append(f"| `{name}` | {code_link} | {intro_link} |")
              count += 1
          
          appendix_lines.append("")
          appendix_lines.append("## Statistics")
          appendix_lines.append("")
          appendix_lines.append("| Metric | Value |")
          appendix_lines.append("|--------|-------|")
          appendix_lines.append(f"| 🍳 **Total Recipes** | `{count}` |")
          appendix_lines.append(f"| 📖 **With Introduction** | `{intro_count}` |")
          appendix_lines.append(f"| 🆕 **Last Updated** | {now} |")
          appendix_lines.append("")
          appendix_lines.append("---")
          appendix_lines.append("")
          appendix_lines.append('> *"Bookmark this page - it\'s your complete Kotlin recipe collection!"* 🚀')
          
          with open("APPENDIX.md", "w") as f:
              f.write("\n".join(appendix_lines))
          
          print(f"✅ Generated APPENDIX.md with {count} recipes ({intro_count} with intro)")
          
          # ===== 4. UPDATE README =====
          with open("README.md", "r") as f:
              readme = f.read()
          
          import re
          readme = re.sub(r'<!-- STRUCTURE_START -->.*?<!-- STRUCTURE_END -->', '', readme, flags=re.DOTALL)
          readme = re.sub(r'### 📖 Recipe Appendix.*?<!-- APPENDIX_END -->', '', readme, flags=re.DOTALL)
          
          new_structure = f'<!-- STRUCTURE_START -->\n{structure_content}\n<!-- STRUCTURE_END -->'
          new_appendix = '### 📖 Recipe Appendix\n\nFor a complete list of all recipes with code and introduction links, check out the [**Full Recipe Appendix**](APPENDIX.md) 📚\n\n> 💡 **Tip:** Each recipe includes a direct link to the code file and introduction (if available)!\n\n<!-- APPENDIX_END -->'
          
          happy_pattern = r'(\*\*Happy cooking! 👨‍🍳🍳\*\*)'
          replacement = f'{new_structure}\n\n{new_appendix}\n\n\\1'
          
          if re.search(happy_pattern, readme, re.DOTALL):
              new_readme = re.sub(happy_pattern, replacement, readme, flags=re.DOTALL)
          else:
              new_readme = readme + f'\n\n{new_structure}\n\n{new_appendix}\n'
          
          with open("README.md", "w") as f:
              f.write(new_readme)
          
          print("✅ README updated")
          print(f"📊 Total: {count} recipes, {categories} categories")
          PYTHON_EOF
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "📚 docs: update structure and appendix [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "KotlinCookBot <41898282+github-actions[bot]@users.noreply.github.com>"
          file_pattern: "README.md APPENDIX.md"
