name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get tag from input or push
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            echo "Using manual tag: $TAG_NAME"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            echo "Using push tag: $TAG_NAME"
          fi
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
      
      - name: Check if tag exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📝 Tag $TAG does not exist yet"
          fi
      
      - name: Create tag if not exists
        if: steps.check.outputs.exists == 'false' && github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "KotlinCookBot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Created and pushed tag: $TAG"
      
      - name: Count recipes
        id: stats
        run: |
          COUNT=$(find src/kotlin/normal -name "*.kt" -type f | wc -l)
          CATEGORIES=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l)
          echo "recipes=$COUNT" >> $GITHUB_OUTPUT
          echo "categories=$CATEGORIES" >> $GITHUB_OUTPUT
      
      - name: Get previous tag
        id: previous
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag -l "v*" | grep -v "$CURRENT_TAG" | sort -V | tail -n1 || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
      
      - name: Generate release notes
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.previous.outputs.tag }}"
          
          cat > release_notes.md << EOF
          ## 🍳 KotlinCookBook $CURRENT_TAG
          
          ### 📊 Statistics
          
          | Metric | Value |
          |--------|-------|
          | 🍽️ Total Recipes | ${{ steps.stats.outputs.recipes }} |
          | 📁 Categories | ${{ steps.stats.outputs.categories }} |
          
          ---
          
          ### 🆕 What's New
          
          EOF
          
          if [ -n "$PREV_TAG" ]; then
            git log --oneline --pretty="- %s" "$PREV_TAG..HEAD" >> release_notes.md
          else
            git log --oneline --pretty="- %s" -10 >> release_notes.md
          fi
          
          cat >> release_notes.md << EOF
          
          ---
          
          ### 🤖 Maintained by KotlinCookBot
          
          <img src="https://raw.githubusercontent.com/${{ github.repository }}/main/.github/avatars/bot.svg" width="50">
          
          *Happy cooking! 🍳*
          EOF
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          name: "🍳 ${{ steps.version.outputs.tag }}"
          tag_name: ${{ steps.version.outputs.tag }}  # 👈 QUAN TRỌNG
          draft: false
          prerelease: false
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        run: |
          echo "## 🚀 Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Recipes | ${{ steps.stats.outputs.recipes }} |" >> $GITHUB_STEP_SUMMARY
