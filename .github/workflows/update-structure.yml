name: Update Project Structure

on:
  push:
    paths:
      - 'src/kotlin/normal/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tree
        run: sudo apt-get install -y tree
      
      - name: Generate structure with echo
        run: |
          # Tạo nội dung structure mới
          echo "## 📁 Project Structure" > /tmp/structure.md
          echo "" >> /tmp/structure.md
          echo '```' >> /tmp/structure.md
          tree src/kotlin/normal --dirsfirst -I "*.md" -L 4 >> /tmp/structure.md
          echo '```' >> /tmp/structure.md
          echo "" >> /tmp/structure.md
          
          # Thống kê
          RECIPE_COUNT=$(find src/kotlin/normal -name "*.kt" -type f | wc -l)
          CATEGORY_COUNT=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l)
          
          echo "### 📊 Statistics" >> /tmp/structure.md
          echo "" >> /tmp/structure.md
          echo "| Metric | Value |" >> /tmp/structure.md
          echo "|--------|-------|" >> /tmp/structure.md
          echo "| 🍳 Recipes | \`$RECIPE_COUNT\` files |" >> /tmp/structure.md
          echo "| 📁 Categories | \`$CATEGORY_COUNT\` folders |" >> /tmp/structure.md
          echo "" >> /tmp/structure.md
          echo "---" >> /tmp/structure.md
          echo "" >> /tmp/structure.md
          echo '<img src=".github/avatars/bot.svg" width="40">' >> /tmp/structure.md
          echo "" >> /tmp/structure.md
          echo "*Last update: $(date +'%Y-%m-%d %H:%M:%S UTC')*" >> /tmp/structure.md
      
      - name: Update README at correct position
        run: |
          # Xóa section cũ nếu có
          sed -i '/<!-- STRUCTURE_START -->/,/<!-- STRUCTURE_END -->/d' README.md
          
          # Thêm markers và nội dung mới vào trước dòng "Happy cooking"
          sed -i '/\*\*Happy cooking! 👨‍🍳🍳\*\*/i\
          <!-- STRUCTURE_START -->\
          '"$(cat /tmp/structure.md)"'\
          <!-- STRUCTURE_END -->\
          ' README.md
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📁 docs: update structure [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "README.md"
