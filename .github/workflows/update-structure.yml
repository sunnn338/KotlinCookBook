name: Update Project Structure

on:
  push:
    paths:
      - 'src/kotlin/normal/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tree
        run: sudo apt-get install -y tree
      
      - name: Generate and update
        run: |
          # Tạo structure
          echo "## 📁 Project Structure" > /tmp/structure.txt
          echo "" >> /tmp/structure.txt
          echo '```' >> /tmp/structure.txt
          tree src/kotlin/normal --dirsfirst -I "*.md" -L 4 >> /tmp/structure.txt
          echo '```' >> /tmp/structure.txt
          echo "" >> /tmp/structure.txt
          
          RECIPE_COUNT=$(find src/kotlin/normal -name "*.kt" -type f | wc -l)
          echo "📊 **$RECIPE_COUNT recipes**" >> /tmp/structure.txt
          echo "" >> /tmp/structure.txt
          echo '<img src=".github/avatars/bot.svg" width="30">' >> /tmp/structure.txt
          echo "" >> /tmp/structure.txt
          echo "*Updated: $(date +'%Y-%m-%d')*" >> /tmp/structure.txt
          
          # Dùng Python để cập nhật README
          python3 << 'PYTHON_EOF'
          import re
          
          # Đọc structure mới
          with open('/tmp/structure.txt', 'r') as f:
              new_struct = f.read().strip()
          
          # Đọc README
          with open('README.md', 'r') as f:
              readme = f.read()
          
          # Xóa section cũ
          readme = re.sub(r'<!-- STRUCTURE_START -->.*?<!-- STRUCTURE_END -->', '', readme, flags=re.DOTALL)
          
          # Tìm vị trí "Happy cooking"
          pattern = r'(\*\*Happy cooking! 👨‍🍳🍳\*\*)'
          
          # Chèn structure mới vào trước
          replacement = f'<!-- STRUCTURE_START -->\n{new_struct}\n<!-- STRUCTURE_END -->\n\n\1'
          new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)
          
          # Ghi lại
          with open('README.md', 'w') as f:
              f.write(new_readme)
          
          print("✅ README updated")
          PYTHON_EOF
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📁 docs: update structure [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "README.md"
