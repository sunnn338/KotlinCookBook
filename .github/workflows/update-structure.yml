name: Update Project Structure

on:
  push:
    paths:
      - 'src/kotlin/normal/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate structure
        run: |
          python3 << 'PYTHON_EOF'
          import os
          from pathlib import Path
          from datetime import datetime
          
          # Generate tree
          def generate_tree(path, prefix="", is_last=True, level=0):
              if level > 4:
                  return []
              lines = []
              items = sorted([p for p in Path(path).iterdir() 
                             if p.name not in ["introduction.md", ".DS_Store"]],
                             key=lambda x: (not x.is_dir(), x.name.lower()))
              for i, item in enumerate(items):
                  is_last_item = (i == len(items) - 1)
                  connector = "└── " if is_last_item else "├── "
                  if item.is_dir():
                      lines.append(f"{prefix}{connector}{item.name}/")
                      next_prefix = prefix + ("    " if is_last_item else "│   ")
                      lines.extend(generate_tree(item, next_prefix, is_last_item, level + 1))
                  elif item.suffix == '.kt':
                      lines.append(f"{prefix}{connector}{item.name}")
              return lines
          
          # Statistics
          total = len(list(Path("src/kotlin/normal").rglob("*.kt")))
          categories = len([d for d in Path("src/kotlin/normal").iterdir() if d.is_dir()])
          
          # Build content
          content = []
          content.append("## 📁 Project Structure")
          content.append("")
          content.append("```")
          content.append("src/kotlin/normal/")
          content.extend(generate_tree("src/kotlin/normal"))
          content.append("```")
          content.append("")
          content.append("## 📊 Statistics")
          content.append("")
          content.append("| Metric | Value |")
          content.append("|--------|-------|")
          content.append(f"| 🍳 **Total Recipes** | `{total}` Kotlin files |")
          content.append(f"| 📁 **Categories** | `{categories}` folders |")
          content.append(f"| 🆕 **Latest update** | {datetime.now().strftime('%Y-%m-%d')} |")
          content.append("")
          content.append('<img src=".github/avatars/bot.svg" width="30">')
          content.append("")
          content.append(f"*Auto-updated: {datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')}*")
          
          with open('/tmp/structure.md', 'w', encoding='utf-8') as f:
              f.write("\n".join(content))
          
          print(f"✅ Generated: {total} recipes, {categories} categories")
          PYTHON_EOF
      
      - name: Update README at marker position
        run: |
          python3 << 'PYTHON_EOF'
          import re
          
          with open('/tmp/structure.md', 'r', encoding='utf-8') as f:
              new_content = f.read().strip()
          
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()
          
          # Replace content between markers
          pattern = r'(<!-- STRUCTURE_START -->).*?(<!-- STRUCTURE_END -->)'
          replacement = f'<!-- STRUCTURE_START -->\n{new_content}\n<!-- STRUCTURE_END -->'
          
          if re.search(pattern, readme, re.DOTALL):
              new_readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)
          else:
              # If markers don't exist, add them before "How to Contribute"
              new_readme = readme.replace(
                  '## 🤝 How to Contribute',
                  f'<!-- STRUCTURE_START -->\n{new_content}\n<!-- STRUCTURE_END -->\n\n## 🤝 How to Contribute'
              )
          
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_readme)
          
          print("✅ README updated at correct position")
          PYTHON_EOF
      
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "📊 docs: update structure [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "README.md"
