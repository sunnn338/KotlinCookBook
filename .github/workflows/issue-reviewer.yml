name: Manual Issue Reviewer (Fixed)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Get issue content
        id: issue
        run: |
          ISSUE_NUM="${{ inputs.issue_number }}"
          
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUM" \
            -o /tmp/issue.json
          
          echo "$ISSUE_NUM" > /tmp/issue_number.txt
          
          # Check if issue exists
          if grep -q "Not Found" /tmp/issue.json; then
            echo "❌ Issue #$ISSUE_NUM not found!"
            exit 1
          fi
      
      - name: Call Gemini API (with debug)
        run: |
          BODY=$(jq -r '.body' /tmp/issue.json | head -c 1000)
          TITLE=$(jq -r '.title' /tmp/issue.json)
          
          # Simple prompt
          PROMPT="Reply to this GitHub issue (keep under 100 words, use 🍳 emoji):
          
          Title: $TITLE
          Body: $BODY"
          
          # Escape for JSON
          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -sR .)
          
          # Call Gemini
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": $ESCAPED_PROMPT
                }]
              }]
            }")
          
          # Get status code (last line)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            # Success - extract text
            TEXT=$(echo "$RESPONSE_BODY" | jq -r '.candidates[0].content.parts[0].text // "No response"')
            echo "$TEXT" > /tmp/reply.txt
            echo "✅ API call successful"
          else
            # Error - show details
            echo "❌ API call failed with status $HTTP_CODE"
            echo "Response: $RESPONSE_BODY"
            echo "I'm currently having technical difficulties. Please try again later! 🍳" > /tmp/reply.txt
          fi
      
      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNumber = parseInt(fs.readFileSync('/tmp/issue_number.txt', 'utf8').trim());
            const reply = fs.readFileSync('/tmp/reply.txt', 'utf8');
            
            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🍳 **KotlinCookBot:**\n\n${reply}\n\n---\n*🤖 Manual run by @${{ github.actor }}*`
            });
