name: Manual Issue Reviewer

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Debug - Print issue number
        run: |
          echo "Issue number: ${{ inputs.issue_number }}"
          echo "Type check: ${{ github.event.inputs.issue_number }}"
      
      - name: Get issue content
        id: issue
        run: |
          # Lấy issue number từ input (quan trọng!)
          ISSUE_NUM="${{ inputs.issue_number }}"
          
          if [ -z "$ISSUE_NUM" ] || [ "$ISSUE_NUM" == "null" ]; then
            echo "❌ No issue number provided!"
            exit 1
          fi
          
          echo "Fetching issue #$ISSUE_NUM"
          
          # Gọi API để lấy issue
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUM" \
            -o /tmp/issue.json
          
          # Lưu issue number vào file
          echo "$ISSUE_NUM" > /tmp/issue_number.txt
          
          # Kiểm tra nếu issue không tồn tại
          if grep -q "Not Found" /tmp/issue.json; then
            echo "❌ Issue #$ISSUE_NUM not found!"
            exit 1
          fi
          
          echo "✅ Issue found"
      
      - name: Call Gemini API
        run: |
          BODY=$(jq -r '.body' /tmp/issue.json)
          TITLE=$(jq -r '.title' /tmp/issue.json)
          
          PROMPT="You are KotlinCookBot. Reply to issue: $TITLE - $BODY. Keep it short (max 100 words). Use emojis."
          
          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -sR .)
          
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": $ESCAPED_PROMPT
                }]
              }]
            }")
          
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Sorry, I had trouble processing that!"' > /tmp/reply.txt
      
      - name: Add comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Đọc issue number từ file
            const issueNumber = parseInt(fs.readFileSync('/tmp/issue_number.txt', 'utf8').trim());
            const reply = fs.readFileSync('/tmp/reply.txt', 'utf8');
            
            console.log(`Posting comment to issue #${issueNumber}`);
            
            if (isNaN(issueNumber)) {
              console.error('Invalid issue number!');
              throw new Error('Issue number is NaN');
            }
            
            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🍳 **KotlinCookBot:**\n\n${reply}\n\n---\n*🔧 Manual run by @${{ github.actor }}*`
            });
            
            console.log('✅ Comment posted successfully!');
