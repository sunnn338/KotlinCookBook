name: 🧪 Test Kotlin Kitchen

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-all-recipes:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🍴 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 💾 Cache Kotlin compiler
        id: cache-kotlin
        uses: actions/cache@v4
        with:
          path: ~/kotlinc
          key: ${{ runner.os }}-kotlin-2.0.20
      
      - name: 🏗️ Install Kotlin (cached)
        if: steps.cache-kotlin.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/JetBrains/kotlin/releases/download/v2.0.20/kotlin-compiler-2.0.20.zip
          unzip -q kotlin-compiler-2.0.20.zip -d ~/
          rm kotlin-compiler-2.0.20.zip
      
      - name: 🔗 Add Kotlin to PATH
        run: |
          echo "$HOME/kotlinc/bin" >> $GITHUB_PATH
      
      - name: 🧪 Test each recipe (compile + run)
        run: |
          echo "🧪 Starting kitchen tests..."
          echo ""
          
          FAILED=0
          TOTAL=0
          
          for file in $(grep -l "fun main" $(find src -name "*.kt" -type f) 2>/dev/null || true); do
            TOTAL=$((TOTAL + 1))
            echo "🔪 Testing: $file"
            
            # Lấy tên file không có extension
            filename=$(basename "$file" .kt)
            dir=$(dirname "$file")
            
            # Compile file Kotlin
            if kotlinc "$file" -include-runtime -d "$dir/$filename.jar" 2>/tmp/compile_error.txt; then
              # Chạy file đã compile
              if java -jar "$dir/$filename.jar" > /tmp/output.txt 2>&1; then
                echo "   ✅ PASSED"
              else
                echo "   ❌ FAILED (runtime error)"
                echo "   📜 Output:"
                cat /tmp/output.txt | sed 's/^/      /'
                FAILED=$((FAILED + 1))
              fi
              # Dọn dẹp file jar sau khi test
              rm -f "$dir/$filename.jar"
            else
              echo "   ❌ FAILED (compilation error)"
              echo "   📜 Error:"
              cat /tmp/compile_error.txt | sed 's/^/      /'
              FAILED=$((FAILED + 1))
            fi
            echo ""
          done
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Results: $((TOTAL - FAILED))/$TOTAL passed"
          
          if [ $FAILED -ne 0 ]; then
            echo "❌ $FAILED recipe(s) failed!"
            exit 1
          else
            echo "🎉 All recipes passed! Bon appétit!"
            exit 0
          fi
