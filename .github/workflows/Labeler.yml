name: Issue Label Manager

on:
  issues:
    types: [opened, closed, reopened, edited]
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: issue-labels-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  manage-labels:
    runs-on: ubuntu-latest
    steps:
      # ===== 1. ENSURE LABELS EXIST =====
      - name: Ensure labels exist
        uses: actions/github-script@v9
        with:
          script: |
            const labels = [
              { name: 'Unresolved', color: 'E99695', description: 'Issue not yet resolved' },
              { name: 'Resolving', color: 'FBCA04', description: 'Currently being worked on' },
              { name: 'Resolved', color: '2CBE4E', description: 'Issue has been resolved' },
              { name: 'bug', color: 'D73A4A', description: 'Something is not working' },
              { name: 'enhancement', color: 'A2EEEF', description: 'New feature or request' },
              { name: 'question', color: '1D76DB', description: 'Further information is requested' },
              { name: 'documentation', color: '0075CA', description: 'Related to documentation' }
            ];
            
            for (const label of labels) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label.name,
                color: label.color,
                description: label.description
              }).catch(() => {});
            }
      
      # ===== 2. NEW ISSUE - RESOLVING + GEMINI AUTO LABEL =====
      - name: New issue - Add Resolving + Gemini label
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.issue.title;
            const body = context.payload.issue.body || '';
            
            // Always add Resolving first
            const labelsToAdd = ['Resolving'];
            
            // Call Gemini to predict category label
            let geminiLabel = 'question';
            try {
              const prompt = `Analyze this GitHub issue for a Kotlin learning repository.
              
              Title: ${title}
              Body: ${body.substring(0, 1000)}
              
              Return ONLY ONE word from this list: bug, enhancement, question, documentation
              - bug: error, crash, unexpected behavior
              - enhancement: new feature, improvement, suggestion
              - question: asking for help, how to do something
              - documentation: README, comments, missing docs
              
              If unsure, return 'question'.`;
              
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                  })
                }
              );
              
              const data = await response.json();
              geminiLabel = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim().toLowerCase() || 'question';
              
              // Validate label
              if (!['bug', 'enhancement', 'question', 'documentation'].includes(geminiLabel)) {
                geminiLabel = 'question';
              }
            } catch (error) {
              console.log('Gemini API failed, using default: question');
              geminiLabel = 'question';
            }
            
            labelsToAdd.push(geminiLabel);
            
            // Add labels
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labelsToAdd
            });
            
            // Welcome comment
            const labelEmoji = {
              'bug': '🐛', 'enhancement': '✨', 'question': '❓', 'documentation': '📚'
            };
            const emoji = labelEmoji[geminiLabel] || '🍳';
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🍳 **KotlinCookBot:** Thanks for the issue! 🎉\n\n` +
                     `🏷️ Auto-labeled: \`Resolving\` + ${emoji} \`${geminiLabel}\`\n\n` +
                     `A maintainer will review it soon. Meanwhile, check our [Contributing Guide](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md).\n\n` +
                     `*Happy cooking!* 👨‍🍳`
            });
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_SERVER_URL: ${{ env.GITHUB_SERVER_URL }}
      
      # ===== 3. ISSUE REOPENED - BACK TO UNRESOLVED =====
      - name: Issue reopened - Back to Unresolved
        if: github.event_name == 'issues' && github.event.action == 'reopened'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Resolved'
            }).catch(() => {});
            
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Unresolved']
            });
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🍳 **KotlinCookBot:** Issue reopened and moved back to `Unresolved`. Ready for review! 🔄'
            });
      
      # ===== 4. ISSUE CLOSED - ADD RESOLVED =====
      - name: Issue closed - Add Resolved
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Unresolved'
            }).catch(() => {});
            
            await github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Resolving'
            }).catch(() => {});
            
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Resolved']
            });
      
      # ===== 5. COMMENT /RESOLVE - ONLY FOR MAINTAINERS =====
      - name: Comment /resolve - Only for maintainers
        if: |
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '/resolve')
        uses: actions/github-script@v9
        with:
          script: |
            const commentUser = context.payload.comment.user.login;
            
            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: commentUser
            });
            
            const isMaintainer = permission.permission === 'admin' || permission.permission === 'write';
            
            if (!isMaintainer) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '🍳 **KotlinCookBot:** Only maintainers can use `/resolve`. Please ask a project maintainer for help! 🔧'
              });
              return;
            }
            
            await github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Unresolved'
            }).catch(() => {});
            
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Resolving']
            });
            
            await github.rest.issues.addAssignees({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              assignees: [commentUser]
            }).catch(() => {});
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🍳 **KotlinCookBot:** @${commentUser} is now working on this issue! Marked as \`Resolving\`. 🔧\n\nOnce finished, close the issue and it will be marked as \`Resolved\` automatically.`
            });
      
      # ===== 6. COMMENT /UNRESOLVE - BACK TO UNRESOLVED =====
      - name: Comment /unresolve - Back to unresolved
        if: |
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '/unresolve')
        uses: actions/github-script@v9
        with:
          script: |
            const commentUser = context.payload.comment.user.login;
            
            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: commentUser
            });
            
            const isMaintainer = permission.permission === 'admin' || permission.permission === 'write';
            
            if (!isMaintainer) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '🍳 **KotlinCookBot:** Only maintainers can use `/unresolve`. 🔧'
              });
              return;
            }
            
            await github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Resolving'
            }).catch(() => {});
            
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Unresolved']
            });
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🍳 **KotlinCookBot:** @${commentUser} moved this back to \`Unresolved\`. Ready for someone else to pick up! 📋`
            });
