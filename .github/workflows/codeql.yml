name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '27 12 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Kotlin
      run: |
        wget -q https://github.com/JetBrains/kotlin/releases/download/v2.0.20/kotlin-compiler-2.0.20.zip
        unzip -q -o kotlin-compiler-2.0.20.zip -d ~/
        echo "$HOME/kotlinc/bin" >> $GITHUB_PATH
        rm kotlin-compiler-2.0.20.zip

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: java-kotlin
        build-mode: manual

    - name: Manual build (compile Kotlin)
      run: |
        echo "Compiling Kotlin files for CodeQL..."
        kotlinc src/kotlin/normal/**/*.kt -d /tmp/kotlin-build || true
        echo "✅ Manual build completed"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
