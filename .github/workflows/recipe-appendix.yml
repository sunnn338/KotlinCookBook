name: Update Recipe Appendix

on:
  push:
    paths:
      - 'src/kotlin/normal/**/*.kt'
      - 'src/kotlin/normal/**/introduction.md'
  workflow_dispatch:

jobs:
  update-appendix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate APPENDIX.md from actual files
        run: |
          # Start file
          echo "# 📚 KotlinCookBook - Complete Recipe Appendix" > APPENDIX.md
          echo "" >> APPENDIX.md
          echo "> *\"All recipes in one place - your complete Kotlin cookbook index!\"* 🍳" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          # Store current category
          current_category=""
          
          # Find all directories containing .kt files, sorted
          for dir in $(find src/kotlin/normal -type d | sort); do
            # Check if directory has any .kt file
            kt_files=$(find "$dir" -maxdepth 1 -name "*.kt" -type f | head -1)
            
            if [ -n "$kt_files" ]; then
              # Get category name from path
              category=$(echo "$dir" | sed 's|src/kotlin/normal/||')
              
              # Clean up category name for display
              if [[ "$category" == "Loops/For" ]]; then
                display_category="Loops - For"
              elif [[ "$category" == "Loops/While" ]]; then
                display_category="Loops - While"
              elif [[ "$category" == "Loops/DoWhile" ]]; then
                display_category="Loops - Do-While"
              elif [[ "$category" == "Variables/WorkWithIt" ]]; then
                display_category="Variables (String Manipulation)"
              elif [[ "$category" == "Functions/BasicFunction" ]]; then
                display_category="Functions - Basic"
              elif [[ "$category" == "Functions/LambdaFunction" ]]; then
                display_category="Functions - Lambda"
              else
                display_category="$category"
              fi
              
              echo "## $display_category" >> APPENDIX.md
              echo "" >> APPENDIX.md
              
              # Check for introduction.md
              intro_file="$dir/introduction.md"
              if [ -f "$intro_file" ]; then
                echo "<details>" >> APPENDIX.md
                echo "<summary>📖 Read Introduction</summary>" >> APPENDIX.md
                echo "" >> APPENDIX.md
                # Extract first 20 lines of introduction (or full if small)
                head -30 "$intro_file" >> APPENDIX.md
                echo "" >> APPENDIX.md
                echo "</details>" >> APPENDIX.md
                echo "" >> APPENDIX.md
              fi
              
              # Table header
              echo "| Recipe | Description | Link |" >> APPENDIX.md
              echo "|--------|-------------|------|" >> APPENDIX.md
              
              # Add each .kt file in this directory
              for kt_file in $(find "$dir" -maxdepth 1 -name "*.kt" -type f | sort); do
                recipe_name=$(basename "$kt_file")
                
                # Extract description from first comment in file
                description=$(grep -E '^\s*\*\s*(What you'll learn:|Teaches:|Recipe:)' "$kt_file" | head -1 | sed 's/.*\*\s*//' | cut -c1-60)
                
                if [ -z "$description" ]; then
                  description="Kotlin recipe"
                fi
                
                # Create GitHub URL
                url="https://github.com/${{ github.repository }}/blob/main/$kt_file"
                
                echo "| \`$recipe_name\` | $description | [🔗 View]($url) |" >> APPENDIX.md
              done
              
              echo "" >> APPENDIX.md
            fi
          done
          
          # Add special case: Root level .kt files (if any)
          if [ -f "src/kotlin/normal/DataTypes.kt" ]; then
            echo "## Data Types" >> APPENDIX.md
            echo "" >> APPENDIX.md
            echo "| Recipe | Description | Link |" >> APPENDIX.md
            echo "|--------|-------------|------|" >> APPENDIX.md
            echo "| \`DataTypes.kt\` | Int, Char, String, Float, Double | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/DataTypes.kt) |" >> APPENDIX.md
            echo "" >> APPENDIX.md
          fi
          
          # Statistics
          TOTAL=$(find src/kotlin/normal -name "*.kt" -type f | grep -v "introduction" | wc -l)
          INTRO_COUNT=$(find src/kotlin/normal -name "introduction.md" -type f | wc -l)
          CATEGORIES=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l)
          
          echo "## Statistics" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Metric | Value |" >> APPENDIX.md
          echo "|--------|-------|" >> APPENDIX.md
          echo "| 🍳 **Total Recipes** | \`$TOTAL\` |" >> APPENDIX.md
          echo "| 📖 **Introductions** | \`$INTRO_COUNT\` |" >> APPENDIX.md
          echo "| 📁 **Categories** | \`$CATEGORIES\` |" >> APPENDIX.md
          echo "| 🆕 **Last Updated** | $(date +'%Y-%m-%d %H:%M:%S UTC') |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "---" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "> *\"Bookmark this page - it's your complete Kotlin recipe collection!\"* 🚀" >> APPENDIX.md
          
          echo "✅ Generated APPENDIX.md with $TOTAL recipes"
      
      - name: Update README (insert appendix link at correct position)
        run: |
          # Remove old appendix section if exists (between markers)
          sed -i '/<!-- APPENDIX_START -->/,/<!-- APPENDIX_END -->/d' README.md
          
          # Insert new appendix section before "Happy cooking"
          sed -i '/\*\*Happy cooking! 👨‍🍳🍳\*\*/i\
          <!-- APPENDIX_START -->\
          ### 📖 Recipe Appendix\
          \
          For a complete list of all recipes with direct links and introductions, check out the [**Full Recipe Appendix**](APPENDIX.md) 📚\
          \
          > 💡 **Tip:** The appendix contains every recipe organized by category with one-click access and concept explanations!\
          \
          <!-- APPENDIX_END -->\
          ' README.md
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📚 docs: auto-update recipe appendix [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "README.md APPENDIX.md"
