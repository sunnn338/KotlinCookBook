name: Update Recipe Appendix

on:
  push:
    paths:
      - 'src/kotlin/normal/**/*.kt'
  workflow_dispatch:

jobs:
  update-appendix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate APPENDIX.md
        run: |
          echo "# 📚 KotlinCookBook - Complete Recipe Appendix" > APPENDIX.md
          echo "" >> APPENDIX.md
          echo "> *\"All recipes in one place - your complete Kotlin cookbook index!\"* 🍳" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          echo "## Getting Started" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Recipe | Description | Link |" >> APPENDIX.md
          echo "|--------|-------------|------|" >> APPENDIX.md
          echo "| \`HelloWorld.kt\` | Your first Kotlin program | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/GettingStarted/HelloWorld.kt) |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          echo "## Variables" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Recipe | Description | Link |" >> APPENDIX.md
          echo "|--------|-------------|------|" >> APPENDIX.md
          echo "| \`CommonVariables.kt\` | Int, Char, String, Float, Double | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Variables/CommonVariables.kt) |" >> APPENDIX.md
          echo "| \`ImmutableVariables.kt\` | \`val\` (cannot change) | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Variables/ImmutableVariables.kt) |" >> APPENDIX.md
          echo "| \`MutableVariables.kt\` | \`var\` (can change) | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Variables/MutableVariables.kt) |" >> APPENDIX.md
          echo "| \`StringSplitter.kt\` | String manipulation | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Variables/WorkWithIt/StringSplitter.kt) |" >> APPENDIX.md
          echo "| \`StringSplitterv2.kt\` | Advanced string splitting | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Variables/WorkWithIt/StringSplitterv2.kt) |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          echo "## If/When" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Recipe | Description | Link |" >> APPENDIX.md
          echo "|--------|-------------|------|" >> APPENDIX.md
          echo "| \`IfChef.kt\` | \`if\` and \`else\` decisions | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/IfChef/IfChef.kt) |" >> APPENDIX.md
          echo "| \`WhenChef.kt\` | \`when\` expression (spice rack) | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/WhenChef/WhenChef.kt) |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          echo "## Loops" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Recipe | Description | Link |" >> APPENDIX.md
          echo "|--------|-------------|------|" >> APPENDIX.md
          echo "| \`ForStirring.kt\` | \`for\` loop (batch cooking) | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Loops/For/ForStirring.kt) |" >> APPENDIX.md
          echo "| \`WhileStirring.kt\` | \`while\` loop (check first) | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Loops/While/WhileStirring.kt) |" >> APPENDIX.md
          echo "| \`DoWhileStirring.kt\` | \`do-while\` loop (taste first) | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Loops/DoWhile/DoWhileStirring.kt) |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          echo "## Break/Continue" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Recipe | Description | Link |" >> APPENDIX.md
          echo "|--------|-------------|------|" >> APPENDIX.md
          echo "| \`Break.kt\` | Stop loop entirely | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/BreakAndContinue/Break.kt) |" >> APPENDIX.md
          echo "| \`Continue.kt\` | Skip one iteration | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/BreakAndContinue/Continue.kt) |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          echo "## Null Safety" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Recipe | Description | Link |" >> APPENDIX.md
          echo "|--------|-------------|------|" >> APPENDIX.md
          echo "| \`InputAndNullSafety.kt\` | User input & null safety | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/InputAndNullSafety/InputAndNullSafety.kt) |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          echo "## Functions" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Recipe | Description | Link |" >> APPENDIX.md
          echo "|--------|-------------|------|" >> APPENDIX.md
          echo "| \`BasicFunction.kt\` | Creating basic functions | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Functions/BasicFunction/BasicFunction.kt) |" >> APPENDIX.md
          echo "| \`LambdaFunction.kt\` | Lambda expressions | [🔗 View](https://github.com/${{ github.repository }}/blob/main/src/kotlin/normal/Functions/LambdaFunction/LambdaFunction.kt) |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          
          TOTAL=$(find src/kotlin/normal -name "*.kt" -type f | grep -v "introduction" | wc -l)
          CATEGORIES=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l)
          
          echo "## Statistics" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "| Metric | Value |" >> APPENDIX.md
          echo "|--------|-------|" >> APPENDIX.md
          echo "| 🍳 **Total Recipes** | \`$TOTAL\` |" >> APPENDIX.md
          echo "| 📁 **Categories** | \`$CATEGORIES\` |" >> APPENDIX.md
          echo "| 🆕 **Last Updated** | $(date +'%Y-%m-%d') |" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "---" >> APPENDIX.md
          echo "" >> APPENDIX.md
          echo "> *\"Bookmark this page - it's your complete Kotlin recipe collection!\"* 🚀" >> APPENDIX.md
      
      - name: Update README
        run: |
          # Remove old appendix section if exists
          sed -i '/### 📖 Recipe Appendix/,/> 💡/d' README.md
          
          # Add new appendix section with link
          echo "" >> README.md
          echo "### 📖 Recipe Appendix" >> README.md
          echo "" >> README.md
          echo "For a complete list of all recipes with direct links, check out the [**Full Recipe Appendix**](APPENDIX.md) 📚" >> README.md
          echo "" >> README.md
          echo "> 💡 **Tip:** The appendix contains every recipe organized by category with one-click access!" >> README.md
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📚 docs: update recipe appendix [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "README.md APPENDIX.md"
