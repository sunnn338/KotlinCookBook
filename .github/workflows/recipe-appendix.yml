name: Update Recipe Appendix

on:
  push:
    paths:
      - 'src/kotlin/normal/**/*.kt'
  workflow_dispatch:

jobs:
  update-appendix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate APPENDIX.md
        run: |
          python3 << 'PYTHON_EOF'
          import os
          from pathlib import Path
          from datetime import datetime
          
          repo = os.environ.get('GITHUB_REPOSITORY', 'realmg51-cpu/KotlinCookBook')
          
          # Start file
          lines = []
          lines.append("# 📚 KotlinCookBook - Complete Recipe Appendix")
          lines.append("")
          lines.append('> *"All recipes in one place - your complete Kotlin cookbook index!"* 🍳')
          lines.append("")
          lines.append("| Recipe | Path | Link |")
          lines.append("|--------|------|------|")
          
          # Find all .kt files (skip introduction files)
          count = 0
          for kt_file in sorted(Path("src/kotlin/normal").rglob("*.kt")):
              if "introduction" in str(kt_file).lower():
                  continue
              
              name = kt_file.name
              path = str(kt_file)
              url = f"https://github.com/{repo}/blob/main/{path}"
              
              lines.append(f"| `{name}` | `{path}` | [🔗 View]({url}) |")
              count += 1
          
          lines.append("")
          lines.append("## Statistics")
          lines.append("")
          lines.append(f"| Metric | Value |")
          lines.append(f"|--------|-------|")
          lines.append(f"| 🍳 **Total Recipes** | `{count}` |")
          lines.append(f"| 🆕 **Last Updated** | {datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')} |")
          lines.append("")
          lines.append("---")
          lines.append("")
          lines.append('> *"Bookmark this page - it\'s your complete Kotlin recipe collection!"* 🚀')
          
          # Write file
          with open("APPENDIX.md", "w") as f:
              f.write("\n".join(lines))
          
          print(f"✅ Generated APPENDIX.md with {count} recipes")
          PYTHON_EOF
      
      - name: Update README
        run: |
          # Remove old appendix section
          sed -i '/### 📖 Recipe Appendix/,/<!-- APPENDIX_END -->/d' README.md
          
          # Insert before "Happy cooking"
          sed -i '/\*\*Happy cooking! 👨‍🍳🍳\*\*/i\
          ### 📖 Recipe Appendix\n\
          \n\
          For a complete list of all recipes, check out the [**Full Recipe Appendix**](APPENDIX.md) 📚\n\
          \n\
          > 💡 **Tip:** The appendix contains every recipe with direct links to source code!\n\
          ' README.md
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📚 docs: update recipe appendix [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "README.md APPENDIX.md"
