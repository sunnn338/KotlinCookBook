name: Docker CI - Compile & Run

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t kotlincookbook .
      
      - name: Compile and run all recipes
        run: |
          docker run --rm kotlincookbook sh -c '
            failed=0
            for f in $(find src/kotlin/normal -name "*.kt"); do
              name=$(basename "$f" .kt)
              echo "🔨 Compiling $name..."
              
              # Compile to jar
              kotlinc "$f" -include-runtime -d "/tmp/$name.jar"
              
              # Run the jar
              if java -jar "/tmp/$name.jar"; then
                echo "✅ $name passed"
              else
                echo "❌ $name failed"
                failed=$((failed + 1))
              fi
              echo ""
              rm -f "/tmp/$name.jar"
            done
            exit $failed
          '
