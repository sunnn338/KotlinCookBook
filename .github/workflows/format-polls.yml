name: Format Poll

on:
  discussion:
    types: [created]

jobs:
  format-poll:
    runs-on: ubuntu-latest
    if: contains(github.event.discussion.labels.*.name, 'poll')
    steps:
      - name: Convert to poll format
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.discussion.body;
            
            // Parse user input
            const questionMatch = body.match(/### ❓ Poll Question\n([^\n]+)/);
            const optionsMatch = body.match(/### 🔘 Options\n([\s\S]+?)(?=\n###|$)/);
            const durationMatch = body.match(/### ⏰ Duration\n([^\n]+)/);
            
            const question = questionMatch ? questionMatch[1].trim() : "Community Poll";
            const rawOptions = optionsMatch ? optionsMatch[1].trim().split('\n') : [];
            const options = rawOptions.filter(opt => opt.trim().length > 0);
            const duration = durationMatch ? durationMatch[1].trim() : "7 days";
            
            // Build poll content
            let pollContent = `## 📊 ${question}\n\n`;
            pollContent += `Vote below! Poll ends in **${duration}**.\n\n`;
            
            for (const option of options) {
              pollContent += `- [ ] ${option}\n`;
            }
            
            pollContent += `\n---\n*Votes are anonymous. You can change your vote anytime.*`;
            
            // Update discussion
            await github.rest.discussions.update({
              discussion_number: context.payload.discussion.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: pollContent
            });
            
            // Add comment with options summary
            let summary = `📊 **Poll created!**\n\n`;
            summary += `**Question:** ${question}\n`;
            summary += `**Options:** ${options.length} choices\n`;
            summary += `**Duration:** ${duration}\n\n`;
            summary += `Check the box above to vote! 🍳`;
            
            await github.rest.discussions.createComment({
              discussion_number: context.payload.discussion.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
