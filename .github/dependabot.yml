version: 2
updates:
  # GitHub Actions - Check ALL workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    # 👇 Quan trọng: Không ignore bất kỳ workflow nào
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]  # Chỉ bỏ qua patch, vẫn check minor/major
    # Hoặc không có ignore gì cả

  # Check tất cả workflows trong thư mục con
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
