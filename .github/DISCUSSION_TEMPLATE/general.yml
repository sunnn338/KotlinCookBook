title: "General Discussion"
labels: ["discussion"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👋 Welcome to KotlinCookBook Discussions!
        
        This is a place to connect with other Kotlin learners and chefs! 🍳
        
        ---
  
  - type: input
    id: topic
    attributes:
      label: "📌 Topic"
      description: "What would you like to discuss?"
      placeholder: "e.g., Kotlin best practices, learning resources, cooking analogies"
    validations:
      required: true
  
  - type: textarea
    id: content
    attributes:
      label: "💬 Discussion"
      description: "Share your thoughts, questions, or ideas"
      placeholder: |
        I've been learning Kotlin and discovered that...
        
        What do you all think about...
    validations:
      required: true
  
  - type: dropdown
    id: experience
    attributes:
      label: "🍳 Experience Level"
      options:
        - "🥚 Complete Beginner"
        - "🍜 Learning Kotlin"
        - "👨‍🍳 Comfortable with basics"
        - "🔥 Kotlin Master"
        - "🤖 Just curious"
    validations:
      required: false
  
  - type: checkboxes
    id: guidelines
    attributes:
      label: "📋 Community Guidelines"
      options:
        - label: "I have read and agree to follow the [Code of Conduct](https://github.com/realmg51-cpu/KotlinCookBook/blob/main/CODE_OF_CONDUCT.md)"
          required: true
        - label: "I will be respectful and helpful to others"
          required: true
