title: "Community Poll"
labels: ["poll"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📊 Create a Poll
        
        Fill out the form below to create a community poll. 🍳
        
        ---
  
  - type: input
    id: question
    attributes:
      label: "❓ Poll Question"
      placeholder: "e.g., What recipe should we add next?"
    validations:
      required: true
  
  - type: textarea
    id: options
    attributes:
      label: "🔘 Options"
      description: "One option per line"
      placeholder: |
        Extension Functions
        Sealed Classes
        Coroutines
        Flow API
    validations:
      required: true
  
  - type: dropdown
    id: duration
    attributes:
      label: "⏰ Duration"
      options:
        - "3 days"
        - "7 days"
        - "14 days"
        - "30 days"
    validations:
      required: true
  
  - type: textarea
    id: additional
    attributes:
      label: "📝 Additional Context (optional)"
      placeholder: "Any extra information about this poll..."
    validations:
      required: false
