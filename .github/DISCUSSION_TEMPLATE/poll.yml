title: "Community Poll"
labels: ["poll", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📊 Community Poll
        
        Vote on what you'd like to see next in KotlinCookBook! 🍳
        
        ---
  
  - type: input
    id: question
    attributes:
      label: "❓ Poll Question"
      placeholder: "What recipe should we add next?"
    validations:
      required: true
  
  - type: textarea
    id: context
    attributes:
      label: "📝 Context"
      placeholder: "Why are we asking this? What will the results be used for?"
    validations:
      required: false
  
  - type: checkboxes
    id: options
    attributes:
      label: "🔘 Vote for your choice"
      description: "Select one or more options below"
      options:
        - label: "Option 1: Extension Functions"
        - label: "Option 2: Sealed Classes"
        - label: "Option 3: Coroutines"
        - label: "Option 4: Flow API"
        - label: "Option 5: Ktor"
    validations:
      required: true
  
  - type: dropdown
    id: duration
    attributes:
      label: "⏰ Poll Duration"
      options:
        - "3 days"
        - "7 days"
        - "14 days"
        - "30 days"
    validations:
      required: true
  
  - type: checkboxes
    id: guidelines
    attributes:
      label: "📋 Guidelines"
      options:
        - label: "This poll is for gathering community feedback"
          required: true
