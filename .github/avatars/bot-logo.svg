<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="40" fill="#FF6B35"/>
  
  <!-- Cooking pan -->
  <ellipse cx="100" cy="90" rx="50" ry="15" fill="#555"/>
  <rect x="140" y="75" width="30" height="8" rx="4" fill="#777"/>
  
  <!-- K letter -->
  <text x="100" y="155" text-anchor="middle" font-family="Arial Black" font-size="70" fill="white" font-weight="bold">K</text>
  
  <!-- Small decorations -->
  <circle cx="50" cy="160" r="4" fill="#FFD700"/>
  <circle cx="150" cy="160" r="4" fill="#FFD700"/>
  <circle cx="65" cy="170" r="3" fill="#FFD700"/>
  <circle cx="135" cy="170" r="3" fill="#FFD700"/>
</svg>
