<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#FF6B35"/>
  
  <!-- Chef hat -->
  <rect x="65" y="20" width="70" height="50" rx="5" fill="white"/>
  <rect x="55" y="55" width="90" height="15" rx="3" fill="white"/>
  <rect x="60" y="15" width="80" height="10" rx="3" fill="white"/>
  
  <!-- Face -->
  <circle cx="100" cy="100" r="50" fill="#FDDCB5"/>
  
  <!-- Eyes -->
  <circle cx="80" cy="90" r="6" fill="#333"/>
  <circle cx="120" cy="90" r="6" fill="#333"/>
  <circle cx="82" cy="88" r="2" fill="white"/>
  <circle cx="122" cy="88" r="2" fill="white"/>
  
  <!-- Happy mouth -->
  <path d="M75 115 Q100 140 125 115" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Rosy cheeks -->
  <circle cx="70" cy="110" r="8" fill="#FF9999" opacity="0.5"/>
  <circle cx="130" cy="110" r="8" fill="#FF9999" opacity="0.5"/>
  
  <!-- Steam from cooking -->
  <path d="M70 30 Q60 15 70 0" fill="none" stroke="#FFF" stroke-width="3" opacity="0.7" stroke-linecap="round">
    <animate attributeName="d" values="M70 30 Q60 15 70 0;M70 30 Q80 15 70 0;M70 30 Q60 15 70 0" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M100 20 Q90 5 100 -10" fill="none" stroke="#FFF" stroke-width="3" opacity="0.7" stroke-linecap="round">
    <animate attributeName="d" values="M100 20 Q90 5 100 -10;M100 20 Q110 5 100 -10;M100 20 Q90 5 100 -10" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M130 30 Q120 15 130 0" fill="none" stroke="#FFF" stroke-width="3" opacity="0.7" stroke-linecap="round">
    <animate attributeName="d" values="M130 30 Q120 15 130 0;M130 30 Q140 15 130 0;M130 30 Q120 15 130 0" dur="1.8s" repeatCount="indefinite"/>
  </path>
  
  <!-- Apron / Body -->
  <path d="M70 155 L130 155 L140 190 L60 190 Z" fill="#FFF" stroke="#333" stroke-width="2"/>
  <path d="M85 155 L85 190 M115 155 L115 190" stroke="#FF6B35" stroke-width="2"/>
  
  <!-- Spoon in hand -->
  <line x1="140" y1="140" x2="165" y2="165" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <circle cx="170" cy="170" r="8" fill="#C0C0C0"/>
</svg>
